name: CI - Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - AuthenticationService
          - UserProfileService
          - WorkoutService
          - XpProgressionService
          - LeaderboardService
          - SocialService
          - AchievementService
          - ActivityFeedService
          - ChallengeService
          - ProgressTrackingService
          - BodyTrackingService
          - GpsRouteService
          - PremiumSubscriptionService
          - StreakTrackingService
          - SyncService
          - ExerciseLibraryService

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies for ${{ matrix.service }}
        run: dotnet restore backend-dotnet/${{ matrix.service }}/${{ matrix.service }}.csproj

      - name: Build ${{ matrix.service }}
        run: dotnet build backend-dotnet/${{ matrix.service }}/${{ matrix.service }}.csproj --configuration Release --no-restore

      - name: Run tests for ${{ matrix.service }}
        run: |
          if [ -d "backend-dotnet/${{ matrix.service }}/Tests" ]; then
            dotnet test backend-dotnet/${{ matrix.service }}/Tests --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
          else
            echo "No tests found for ${{ matrix.service }}"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: '**/test-results.trx'

  build-shared-libraries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build FitQuest.Shared
        run: dotnet build backend-dotnet/FitQuest.Shared/FitQuest.Shared.csproj --configuration Release

      - name: Build FitQuest.EventBus
        run: dotnet build backend-dotnet/FitQuest.EventBus/FitQuest.EventBus.csproj --configuration Release

  lint-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run code analysis
        run: |
          for service in backend-dotnet/*/; do
            if [ -f "$service/*.csproj" ]; then
              echo "Analyzing $(basename $service)..."
              dotnet build "$service" --configuration Release /p:EnforceCodeStyleInBuild=true || true
            fi
          done

  test-summary:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: 'test-results/**/test-results.trx'
          check_name: 'Test Results'
