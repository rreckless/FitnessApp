name: Docker Build and Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-dotnet/**'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend-dotnet/**'

env:
  REGISTRY: ghcr.io
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - AuthenticationService
          - UserProfileService
          - WorkoutService
          - XpProgressionService
          - LeaderboardService
          - SocialService
          - AchievementService
          - ActivityFeedService
          - ChallengeService
          - ProgressTrackingService
          - BodyTrackingService
          - GpsRouteService
          - PremiumSubscriptionService
          - StreakTrackingService
          - SyncService
          - ExerciseLibraryService

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-dotnet/${{ matrix.service }}
          file: ./backend-dotnet/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  build-shared-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build FitQuest.Shared
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/fitquest-shared:latest \
            -f backend-dotnet/FitQuest.Shared/Dockerfile \
            backend-dotnet/FitQuest.Shared || true

      - name: Build FitQuest.EventBus
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/fitquest-eventbus:latest \
            -f backend-dotnet/FitQuest.EventBus/Dockerfile \
            backend-dotnet/FitQuest.EventBus || true

  scan-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - AuthenticationService
          - UserProfileService
          - WorkoutService
          - XpProgressionService
          - LeaderboardService
          - SocialService
          - AchievementService
          - ActivityFeedService
          - ChallengeService
          - ProgressTrackingService
          - BodyTrackingService
          - GpsRouteService
          - PremiumSubscriptionService
          - StreakTrackingService
          - SyncService
          - ExerciseLibraryService

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
