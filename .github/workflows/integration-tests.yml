name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

env:
  DOTNET_VERSION: '10.0.x'
  POSTGRES_VERSION: '14'
  REDIS_VERSION: '7'
  RABBITMQ_VERSION: '3.12'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_DB: fitquest_test
          POSTGRES_USER: fitquest_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:${{ env.REDIS_VERSION }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:${{ env.RABBITMQ_VERSION }}-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U fitquest_user; do
            sleep 1
          done
          echo "PostgreSQL is ready"

          echo "Waiting for Redis..."
          until redis-cli -h localhost ping; do
            sleep 1
          done
          echo "Redis is ready"

          echo "Waiting for RabbitMQ..."
          until curl -s http://localhost:15672/api/overview > /dev/null; do
            sleep 1
          done
          echo "RabbitMQ is ready"

      - name: Initialize test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U fitquest_user -d fitquest_test -f backend-dotnet/database/schema.sql

      - name: Run integration tests
        env:
          DATABASE_URL: "Host=localhost;Port=5432;Database=fitquest_test;Username=fitquest_user;Password=test_password"
          REDIS_URL: "localhost:6379"
          RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"
        run: |
          for service in backend-dotnet/*/; do
            service_name=$(basename "$service")
            if [ -d "$service/Tests" ]; then
              echo "Running integration tests for $service_name..."
              dotnet test "$service/Tests" \
                --configuration Release \
                --filter "Category=Integration" \
                --logger "trx;LogFileName=integration-test-results.trx" \
                --verbosity normal || true
            fi
          done

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/integration-test-results.trx'

  end-to-end-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_DB: fitquest_test
          POSTGRES_USER: fitquest_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:${{ env.REDIS_VERSION }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:${{ env.RABBITMQ_VERSION }}-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize test database
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U fitquest_user -d fitquest_test -f backend-dotnet/database/schema.sql

      - name: Start microservices
        env:
          DATABASE_URL: "Host=localhost;Port=5432;Database=fitquest_test;Username=fitquest_user;Password=test_password"
          REDIS_URL: "localhost:6379"
          RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"
        run: |
          # Start services in background
          for service in backend-dotnet/*/; do
            service_name=$(basename "$service")
            if [ -f "$service/$service_name.csproj" ]; then
              echo "Starting $service_name..."
              cd "$service"
              dotnet run --configuration Release &
              cd - > /dev/null
              sleep 2
            fi
          done

      - name: Run end-to-end tests
        env:
          API_BASE_URL: "http://localhost:5000"
          DATABASE_URL: "Host=localhost;Port=5432;Database=fitquest_test;Username=fitquest_user;Password=test_password"
        run: |
          echo "Running end-to-end tests..."
          # Add E2E test commands here
          sleep 5

      - name: Collect service logs
        if: always()
        run: |
          echo "Collecting service logs..."
          # Add log collection commands here

  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_DB: fitquest_test
          POSTGRES_USER: fitquest_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:${{ env.REDIS_VERSION }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run performance tests
        env:
          DATABASE_URL: "Host=localhost;Port=5432;Database=fitquest_test;Username=fitquest_user;Password=test_password"
          REDIS_URL: "localhost:6379"
        run: |
          for service in backend-dotnet/*/; do
            service_name=$(basename "$service")
            if [ -d "$service/Tests" ]; then
              echo "Running performance tests for $service_name..."
              dotnet test "$service/Tests" \
                --configuration Release \
                --filter "Category=Performance" \
                --logger "trx;LogFileName=performance-test-results.trx" \
                --verbosity normal || true
            fi
          done

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: '**/performance-test-results.trx'

  test-report:
    runs-on: ubuntu-latest
    needs: [integration-tests, end-to-end-tests, performance-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: 'test-results/**/test-results.trx'
          check_name: 'Integration Test Results'
