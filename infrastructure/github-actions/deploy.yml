name: Deploy to Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/kubernetes/**'
      - '.github/workflows/deploy.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name fitquest-cluster --region ${{ env.AWS_REGION }}

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f infrastructure/kubernetes/namespace.yaml
        kubectl apply -f infrastructure/kubernetes/redis-deployment.yaml
        kubectl apply -f infrastructure/kubernetes/postgresql-deployment.yaml
        kubectl apply -f infrastructure/kubernetes/rabbitmq-deployment.yaml
        kubectl apply -f infrastructure/kubernetes/api-gateway-deployment.yaml
        kubectl apply -f infrastructure/kubernetes/monitoring-deployment.yaml

    - name: Verify deployments
      run: |
        kubectl rollout status deployment/api-gateway -n fitquest --timeout=5m
        kubectl rollout status statefulset/redis -n fitquest --timeout=5m
        kubectl rollout status statefulset/postgresql -n fitquest --timeout=5m
        kubectl rollout status statefulset/rabbitmq -n fitquest --timeout=5m
        kubectl rollout status deployment/prometheus -n monitoring --timeout=5m
        kubectl rollout status deployment/grafana -n monitoring --timeout=5m

    - name: Get service endpoints
      run: |
        echo "API Gateway LoadBalancer IP:"
        kubectl get svc api-gateway -n fitquest
        echo "Grafana endpoint:"
        kubectl get svc grafana -n monitoring
        echo "Prometheus endpoint:"
        kubectl get svc prometheus -n monitoring
