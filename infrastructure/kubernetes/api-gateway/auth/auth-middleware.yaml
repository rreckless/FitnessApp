---
# Authentication Middleware Configuration
# Validates JWT tokens and enforces authentication on protected endpoints
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-middleware-config
  namespace: ingress
  labels:
    app: api-gateway
data:
  # JWT validation configuration
  jwt-validation: |
    # JWT token validation rules
    # Tokens must be signed with the JWT secret
    # Tokens must not be expired
    # Tokens must contain required claims
    
    # Required claims in JWT token
    required-claims: |
      - sub (subject/user ID)
      - email (user email)
      - iat (issued at)
      - exp (expiration)
    
    # Optional claims
    optional-claims: |
      - level (user level)
      - subscription_tier (premium/free)
      - device_id (device fingerprint)
  
  # Token validation endpoints
  validation-endpoints: |
    # Auth Service validation endpoint
    # POST /auth/validate
    # Returns 200 if token is valid, 401 if invalid
    auth-service: http://auth-service.fitquest.svc.cluster.local:8080/auth/validate
  
  # Public endpoints (no authentication required)
  public-endpoints: |
    - /auth/register
    - /auth/login
    - /auth/refresh
    - /auth/password-reset
    - /auth/password-reset/confirm
    - /health
    - /metrics
  
  # Protected endpoints (authentication required)
  protected-endpoints: |
    - /users
    - /workouts
    - /exercises
    - /xp
    - /leaderboards
    - /friends
    - /activity-feed
    - /achievements
    - /challenges
    - /progress
    - /body
    - /routes
    - /gps
    - /sync
    - /subscription
  
  # Premium-only endpoints
  premium-endpoints: |
    - /subscription/upgrade
    - /subscription/cancel
    - /ai-trainer
  
  # Token refresh configuration
  token-refresh: |
    # Automatically refresh tokens that are about to expire
    # Refresh if token expires in less than 5 minutes
    refresh-threshold: 300
    
    # Refresh endpoint
    refresh-endpoint: /auth/refresh
    
    # Refresh token location
    refresh-token-header: X-Refresh-Token
  
  # Authentication error responses
  error-responses: |
    # 401 Unauthorized - Token missing or invalid
    401:
      message: "Unauthorized: Missing or invalid authentication token"
      code: "AUTH_MISSING_OR_INVALID"
    
    # 403 Forbidden - Token valid but insufficient permissions
    403:
      message: "Forbidden: Insufficient permissions for this resource"
      code: "AUTH_INSUFFICIENT_PERMISSIONS"
    
    # 429 Too Many Requests - Rate limit exceeded
    429:
      message: "Too Many Requests: Rate limit exceeded"
      code: "RATE_LIMIT_EXCEEDED"
  
  # CORS configuration for authentication
  cors-auth: |
    # Allow credentials in CORS requests
    allow-credentials: true
    
    # Allow Authorization header in CORS requests
    allow-headers: Authorization, Content-Type, X-Requested-With
    
    # Expose authentication headers in CORS responses
    expose-headers: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset
