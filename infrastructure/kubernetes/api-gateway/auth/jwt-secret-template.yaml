---
# JWT Secret for Token Validation
# This secret contains the JWT signing key used to validate tokens
# IMPORTANT: Replace the placeholder with your actual JWT secret
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: ingress
  labels:
    app: api-gateway
type: Opaque
stringData:
  # JWT signing key (base64 encoded)
  # Generate with: openssl rand -base64 32
  jwt-secret: "REPLACE_WITH_YOUR_JWT_SECRET_KEY"
  
  # JWT algorithm
  jwt-algorithm: "HS256"
  
  # JWT issuer
  jwt-issuer: "fitquest"
  
  # JWT audience
  jwt-audience: "fitquest-api"
