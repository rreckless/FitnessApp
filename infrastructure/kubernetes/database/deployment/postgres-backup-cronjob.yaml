---
# PostgreSQL Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: fitquest
  labels:
    app: postgres
    component: database
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: postgres
            job: backup
        spec:
          serviceAccountName: postgres
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: postgres:14-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  
                  BACKUP_DIR="/backups"
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="$BACKUP_DIR/postgres_backup_$TIMESTAMP.sql.gz"
                  
                  mkdir -p $BACKUP_DIR
                  
                  echo "Starting PostgreSQL backup at $(date)"
                  
                  # Backup all databases
                  pg_dumpall -h postgres.fitquest.svc.cluster.local -U postgres | gzip > $BACKUP_FILE
                  
                  echo "Backup completed: $BACKUP_FILE"
                  
                  # List recent backups
                  echo "Recent backups:"
                  ls -lh $BACKUP_DIR | tail -10
                  
                  # Clean up backups older than 30 days
                  echo "Cleaning up backups older than 30 days..."
                  find $BACKUP_DIR -name "postgres_backup_*.sql.gz" -mtime +30 -delete
                  
                  echo "Backup job completed successfully"
              
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: postgres-password
              
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc

---
# PersistentVolumeClaim for backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: fitquest
  labels:
    app: postgres
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi
