---
# PostgreSQL Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: fitquest
  labels:
    app: postgres
    component: database
data:
  postgresql.conf: |
    # PostgreSQL Configuration for FitQuest
    
    # Connection Settings
    max_connections = 200
    superuser_reserved_connections = 10
    
    # Memory Settings
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    
    # Replication Settings
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    wal_keep_size = 1GB
    hot_standby = on
    hot_standby_feedback = on
    
    # Logging
    log_min_duration_statement = 1000
    log_connections = on
    log_disconnections = on
    log_duration = off
    log_lock_waits = on
    log_statement = 'all'
    log_temp_files = 0
    
    # Performance
    synchronous_commit = on
    fsync = on
    full_page_writes = on
    
    # Monitoring
    shared_preload_libraries = 'pg_stat_statements'
    pg_stat_statements.track = all
    pg_stat_statements.max = 10000
    
    # Autovacuum
    autovacuum = on
    autovacuum_max_workers = 3
    autovacuum_naptime = 10s
    autovacuum_vacuum_threshold = 50
    autovacuum_analyze_threshold = 50
    autovacuum_vacuum_scale_factor = 0.1
    autovacuum_analyze_scale_factor = 0.05
    
    # Backup and Recovery
    archive_mode = on
    archive_command = '/bin/true'
    archive_timeout = 300
    
    # Connection pooling
    tcp_keepalives_idle = 900
    tcp_keepalives_interval = 100
    tcp_keepalives_count = 5

  pg_hba.conf: |
    # PostgreSQL Client Authentication Configuration
    
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            md5
    host    all             all             ::1/128                 md5
    host    replication     all             0.0.0.0/0               md5
    host    all             all             0.0.0.0/0               md5
    host    all             all             ::/0                    md5

  init-databases.sql: |
    -- Initialize FitQuest databases
    
    -- Create users database
    CREATE DATABASE users
      WITH
        ENCODING = 'UTF8'
        LC_COLLATE = 'en_US.UTF-8'
        LC_CTYPE = 'en_US.UTF-8'
        TEMPLATE = template0;
    
    -- Create exercises database
    CREATE DATABASE exercises
      WITH
        ENCODING = 'UTF8'
        LC_COLLATE = 'en_US.UTF-8'
        LC_CTYPE = 'en_US.UTF-8'
        TEMPLATE = template0;
    
    -- Create achievements database
    CREATE DATABASE achievements
      WITH
        ENCODING = 'UTF8'
        LC_COLLATE = 'en_US.UTF-8'
        LC_CTYPE = 'en_US.UTF-8'
        TEMPLATE = template0;
    
    -- Create replication user
    CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'replicator_password';
    
    -- Grant privileges
    GRANT CONNECT ON DATABASE users TO replicator;
    GRANT CONNECT ON DATABASE exercises TO replicator;
    GRANT CONNECT ON DATABASE achievements TO replicator;
