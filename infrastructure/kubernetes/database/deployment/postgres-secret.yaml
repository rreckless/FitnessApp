---
# PostgreSQL Secrets
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: fitquest
  labels:
    app: postgres
    component: database
type: Opaque
stringData:
  postgres-password: "fitquest_postgres_password_change_me"
  replicator-password: "replicator_password_change_me"
  # Connection strings for microservices
  users-db-url: "postgresql://postgres:fitquest_postgres_password_change_me@postgres.fitquest.svc.cluster.local:5432/users"
  exercises-db-url: "postgresql://postgres:fitquest_postgres_password_change_me@postgres.fitquest.svc.cluster.local:5432/exercises"
  achievements-db-url: "postgresql://postgres:fitquest_postgres_password_change_me@postgres.fitquest.svc.cluster.local:5432/achievements"
