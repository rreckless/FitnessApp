---
# ServiceMonitor for PostgreSQL Prometheus metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres
  namespace: fitquest
  labels:
    app: postgres
    component: database
spec:
  selector:
    matchLabels:
      app: postgres
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

---
# PrometheusRule for PostgreSQL alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postgres
  namespace: fitquest
  labels:
    app: postgres
    component: database
spec:
  groups:
    - name: postgres.rules
      interval: 30s
      rules:
        # High connection count
        - alert: PostgresHighConnectionCount
          expr: pg_stat_activity_count > 150
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL high connection count"
            description: "PostgreSQL has {{ $value }} connections (threshold: 150)"
        
        # Database size alert
        - alert: PostgresDatabaseSizeHigh
          expr: pg_database_size_bytes / 1024 / 1024 / 1024 > 40
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL database size high"
            description: "Database size is {{ $value }}GB (threshold: 40GB)"
        
        # Replication lag
        - alert: PostgresReplicationLag
          expr: pg_replication_lag_seconds > 60
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL replication lag detected"
            description: "Replication lag is {{ $value }}s (threshold: 60s)"
        
        # Slow queries
        - alert: PostgresSlowQueries
          expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL slow queries detected"
            description: "Average query time is {{ $value }}ms"
        
        # Cache hit ratio low
        - alert: PostgresLowCacheHitRatio
          expr: rate(pg_stat_database_blks_hit[5m]) / (rate(pg_stat_database_blks_hit[5m]) + rate(pg_stat_database_blks_read[5m])) < 0.99
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL cache hit ratio low"
            description: "Cache hit ratio is {{ $value | humanizePercentage }} (threshold: 99%)"
        
        # Autovacuum running too long
        - alert: PostgresAutovacuumRunningLong
          expr: pg_stat_user_tables_last_autovacuum_age_seconds > 3600
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL autovacuum running long"
            description: "Autovacuum has been running for {{ $value }}s"
        
        # Pod down
        - alert: PostgresPodDown
          expr: up{job="postgres"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL pod is down"
            description: "PostgreSQL pod {{ $labels.pod }} is not responding"
        
        # Replication slot lag
        - alert: PostgresReplicationSlotLag
          expr: pg_replication_slot_wal_retained_bytes / 1024 / 1024 > 500
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL replication slot lag high"
            description: "Replication slot lag is {{ $value }}MB (threshold: 500MB)"
