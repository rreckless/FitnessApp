apiVersion: v1
kind: ConfigMap
metadata:
  name: fitquest-config
  namespace: fitquest
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5000"
  LOG_LEVEL: "Information"
  
  # Database Configuration
  DB_HOST: "postgres.fitquest.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "fitquest"
  
  # Redis Configuration
  REDIS_HOST: "redis-cluster.fitquest.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # RabbitMQ Configuration
  RABBITMQ_HOST: "rabbitmq.fitquest.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  
  # Service Discovery
  SERVICE_DISCOVERY_ENABLED: "true"
  
  # Monitoring
  PROMETHEUS_ENABLED: "true"
  JAEGER_ENABLED: "true"
  JAEGER_AGENT_HOST: "jaeger-agent.monitoring.svc.cluster.local"
  JAEGER_AGENT_PORT: "6831"
  
  # Logging
  SERILOG_ENABLED: "true"
  LOKI_ENABLED: "true"
  LOKI_URL: "http://loki.monitoring.svc.cluster.local:3100"
