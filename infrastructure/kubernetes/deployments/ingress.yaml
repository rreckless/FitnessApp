apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fitquest-api-gateway
  namespace: fitquest
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.fitquest.com
      secretName: fitquest-tls-cert
  rules:
    - host: api.fitquest.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: AuthenticationService
                port:
                  number: 5000
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: UserProfileService
                port:
                  number: 5000
          - path: /workouts
            pathType: Prefix
            backend:
              service:
                name: WorkoutService
                port:
                  number: 5000
          - path: /exercises
            pathType: Prefix
            backend:
              service:
                name: ExerciseLibraryService
                port:
                  number: 5000
          - path: /xp
            pathType: Prefix
            backend:
              service:
                name: XpProgressionService
                port:
                  number: 5000
          - path: /leaderboards
            pathType: Prefix
            backend:
              service:
                name: LeaderboardService
                port:
                  number: 5000
          - path: /friends
            pathType: Prefix
            backend:
              service:
                name: SocialService
                port:
                  number: 5000
          - path: /activity-feed
            pathType: Prefix
            backend:
              service:
                name: ActivityFeedService
                port:
                  number: 5000
          - path: /achievements
            pathType: Prefix
            backend:
              service:
                name: AchievementService
                port:
                  number: 5000
          - path: /challenges
            pathType: Prefix
            backend:
              service:
                name: ChallengeService
                port:
                  number: 5000
          - path: /progress
            pathType: Prefix
            backend:
              service:
                name: ProgressTrackingService
                port:
                  number: 5000
          - path: /body
            pathType: Prefix
            backend:
              service:
                name: BodyTrackingService
                port:
                  number: 5000
          - path: /routes
            pathType: Prefix
            backend:
              service:
                name: GpsRouteService
                port:
                  number: 5000
          - path: /gps
            pathType: Prefix
            backend:
              service:
                name: GpsRouteService
                port:
                  number: 5000
          - path: /subscription
            pathType: Prefix
            backend:
              service:
                name: PremiumSubscriptionService
                port:
                  number: 5000
          - path: /sync
            pathType: Prefix
            backend:
              service:
                name: SyncService
                port:
                  number: 5000
          - path: /streaks
            pathType: Prefix
            backend:
              service:
                name: StreakTrackingService
                port:
                  number: 5000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: AuthenticationService
                port:
                  number: 5000
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@fitquest.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
