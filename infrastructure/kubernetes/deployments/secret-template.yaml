apiVersion: v1
kind: Secret
metadata:
  name: fitquest-secrets
  namespace: fitquest
type: Opaque
stringData:
  # Database Credentials
  DB_USER: "fitquest_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Configuration
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_LONG_RANDOM_STRING"
  JWT_ISSUER: "fitquest.com"
  JWT_AUDIENCE: "fitquest-api"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "guest"
  RABBITMQ_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Credentials (if required)
  REDIS_PASSWORD: ""
  
  # API Keys
  STRIPE_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  # AWS/Cloud Credentials (if using S3 or similar)
  AWS_ACCESS_KEY_ID: "CHANGE_ME_IN_PRODUCTION"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME_IN_PRODUCTION"
  AWS_REGION: "us-east-1"
  
  # Email Configuration
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@fitquest.com"
  SMTP_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Sentry Configuration
  SENTRY_DSN: "CHANGE_ME_IN_PRODUCTION"
  
  # Logging Configuration
  LOKI_USERNAME: "CHANGE_ME_IN_PRODUCTION"
  LOKI_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
