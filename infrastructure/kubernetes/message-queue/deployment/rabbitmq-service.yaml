---
# RabbitMQ Headless Service for clustering
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fitquest
  labels:
    app: rabbitmq
    component: message-queue
spec:
  clusterIP: None
  selector:
    app: rabbitmq
    component: message-queue
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
    - name: metrics
      port: 15692
      targetPort: 15692
      protocol: TCP
    - name: clustering
      port: 25672
      targetPort: 25672
      protocol: TCP
  publishNotReadyAddresses: true

---
# RabbitMQ ClusterIP Service for client connections
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-client
  namespace: fitquest
  labels:
    app: rabbitmq
    component: message-queue
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
    component: message-queue
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
    - name: metrics
      port: 15692
      targetPort: 15692
      protocol: TCP
  sessionAffinity: None

---
# RabbitMQ Management UI Service (optional, for external access)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: fitquest
  labels:
    app: rabbitmq
    component: message-queue
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
    component: message-queue
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
