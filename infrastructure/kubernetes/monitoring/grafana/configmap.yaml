---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
  labels:
    app: grafana
data:
  grafana.ini: |
    [paths]
    data = /var/lib/grafana
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [server]
    protocol = http
    http_addr = 0.0.0.0
    http_port = 3000
    domain = grafana.fitquest.local
    root_url = %(protocol)s://%(domain)s:%(http_port)s/

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db

    [security]
    admin_user = admin
    admin_password = admin
    disable_brute_force_login_protection = false

    [users]
    allow_sign_up = false

    [auth]
    disable_login_form = false

    [auth.anonymous]
    enabled = false

    [analytics]
    check_for_updates = true

    [grafana_net]
    url = https://grafana.net

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'FitQuest Dashboards'
        orgId: 1
        folder: 'FitQuest'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  service-health.json: |
    {
      "dashboard": {
        "title": "Service Health and Uptime",
        "tags": ["fitquest", "services"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Service Availability",
            "targets": [
              {
                "expr": "up{job=~\"fitquest-services\"}"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Request Rate",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=~\"fitquest-services\"}[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"5..\",job=~\"fitquest-services\"}[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  request-latency.json: |
    {
      "dashboard": {
        "title": "Request Latency",
        "tags": ["fitquest", "performance"],
        "timezone": "browser",
        "panels": [
          {
            "title": "p50 Latency",
            "targets": [
              {
                "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{job=~\"fitquest-services\"}[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "title": "p95 Latency",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=~\"fitquest-services\"}[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "title": "p99 Latency",
            "targets": [
              {
                "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job=~\"fitquest-services\"}[5m]))"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  error-rates.json: |
    {
      "dashboard": {
        "title": "Error Rates by Service",
        "tags": ["fitquest", "errors"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Error Rate by Service",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"5..\",job=~\"fitquest-services\"}[5m]) / rate(http_requests_total{job=~\"fitquest-services\"}[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "4xx Errors",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"4..\",job=~\"fitquest-services\"}[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "5xx Errors",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"5..\",job=~\"fitquest-services\"}[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  database-performance.json: |
    {
      "dashboard": {
        "title": "Database Performance",
        "tags": ["fitquest", "database"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Query Duration",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(pg_stat_statements_mean_exec_time_bucket[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Connection Pool Usage",
            "targets": [
              {
                "expr": "pg_stat_activity_count"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Lock Contention",
            "targets": [
              {
                "expr": "rate(pg_stat_user_tables_idx_blks_hit[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  cache-metrics.json: |
    {
      "dashboard": {
        "title": "Cache Hit Rates",
        "tags": ["fitquest", "cache"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Redis Hit Rate",
            "targets": [
              {
                "expr": "redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Redis Memory Usage",
            "targets": [
              {
                "expr": "redis_memory_used_bytes"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Cache Evictions",
            "targets": [
              {
                "expr": "rate(redis_evicted_keys_total[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }

  message-queue.json: |
    {
      "dashboard": {
        "title": "Message Queue Depth",
        "tags": ["fitquest", "messaging"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Queue Depth",
            "targets": [
              {
                "expr": "rabbitmq_queue_messages_ready"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Consumer Count",
            "targets": [
              {
                "expr": "rabbitmq_queue_consumers"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Message Rate",
            "targets": [
              {
                "expr": "rate(rabbitmq_queue_messages_total[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }
