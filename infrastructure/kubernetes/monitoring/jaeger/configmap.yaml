---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: monitoring
  labels:
    app: jaeger
data:
  sampling.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      },
      "service_strategies": [
        {
          "service": "auth-service",
          "type": "probabilistic",
          "param": 0.5
        },
        {
          "service": "workout-service",
          "type": "probabilistic",
          "param": 0.3
        },
        {
          "service": "xp-progression-service",
          "type": "probabilistic",
          "param": 0.3
        },
        {
          "service": "leaderboard-service",
          "type": "probabilistic",
          "param": 0.2
        }
      ]
    }
