apiVersion: v1
kind: Namespace
metadata:
  name: fitquest
  labels:
    name: fitquest
    environment: production
    managed-by: kiro
spec:
  finalizers:
    - kubernetes
---
# Resource Quota for fitquest namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fitquest-quota
  namespace: fitquest
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    limits.cpu: "200"
    limits.memory: "400Gi"
    pods: "500"
    services: "100"
    persistentvolumeclaims: "50"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values: ["default", "high-priority"]
---
# Network Policy for fitquest namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fitquest-network-policy
  namespace: fitquest
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress namespace (API Gateway)
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Allow traffic from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    # Allow inter-pod communication within fitquest namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow traffic to other services in fitquest namespace
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Allow traffic to monitoring namespace
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    # Allow traffic to external services (databases, message queues)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 5672  # RabbitMQ
        - protocol: TCP
          port: 443   # HTTPS
---
# Pod Security Policy for fitquest namespace
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: fitquest-psp
  namespace: fitquest
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'MustRunAs'
    seLinuxOptions:
      level: "s0:c123,c456"
  supplementalGroups:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: false
---
# RBAC Role for fitquest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fitquest-role
  namespace: fitquest
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
# RBAC RoleBinding for fitquest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fitquest-rolebinding
  namespace: fitquest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fitquest-role
subjects:
  - kind: ServiceAccount
    name: fitquest-sa
    namespace: fitquest
---
# Service Account for fitquest namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fitquest-sa
  namespace: fitquest
  labels:
    app: fitquest
