apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: fitquest
data:
  postgresql.conf: |
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 1310kB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 4
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2
    wal_level = replica
    max_wal_senders = 3
    max_replication_slots = 3
    hot_standby = on
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: fitquest
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:14-alpine
        ports:
        - containerPort: 5432
          name: postgresql
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgresql-config
          mountPath: /etc/postgresql
        - name: postgresql-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgresql-config
        configMap:
          name: postgresql-config
  volumeClaimTemplates:
  - metadata:
      name: postgresql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: fitquest
spec:
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: fitquest
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: fitquest
type: Opaque
stringData:
  username: fitquest
  password: changeme-secure-password
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-init
  namespace: fitquest
spec:
  template:
    spec:
      containers:
      - name: postgresql-init
        image: postgres:14-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        command:
        - /bin/sh
        - -c
        - |
          sleep 30
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_users;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_exercises;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_achievements;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_workouts;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_leaderboards;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_social;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_sync;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_gps;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_body_tracking;"
          psql -h postgresql -U fitquest -c "CREATE DATABASE fitquest_premium;"
      restartPolicy: Never
  backoffLimit: 3
