---
# ConfigMap for Redis configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: fitquest
  labels:
    app: redis-cluster
    component: config
data:
  redis.conf: |
    # Redis configuration for FitQuest cluster
    
    # Network and General
    port 6379
    bind 0.0.0.0
    protected-mode no
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300
    daemonize no
    pidfile /var/run/redis.pid
    loglevel notice
    logfile ""
    
    # Database
    databases 16
    
    # Snapshotting (RDB)
    # Save the DB on disk
    save 60 1000
    save 300 10
    save 900 1
    
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data
    
    # Replication
    # Master-slave replication
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    repl-disable-tcp-nodelay no
    repl-backlog-size 1mb
    repl-backlog-ttl 3600
    slave-serve-stale-data yes
    slave-read-only yes
    repl-ping-slave-period 10
    repl-timeout 60
    
    # Security
    # requirepass foobared
    
    # Clients
    maxclients 10000
    
    # Memory Management
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    
    # Lazy Freeing
    lazyfree-lazy-eviction no
    lazyfree-lazy-expire no
    lazyfree-lazy-server-del no
    slave-lazy-flush no
    
    # Append Only File (AOF)
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    aof-load-truncated yes
    aof-use-rdb-preamble yes
    
    # Lua scripting
    lua-time-limit 5000
    
    # Slow Log
    slowlog-log-slower-than 10000
    slowlog-max-len 128
    
    # Event notification
    notify-keyspace-events ""
    
    # Advanced config
    hash-max-ziplist-entries 512
    hash-max-ziplist-value 64
    list-max-ziplist-size -2
    list-compress-depth 0
    set-max-intset-entries 512
    zset-max-ziplist-entries 128
    zset-max-ziplist-value 64
    hll-sparse-max-bytes 3000
    stream-node-max-bytes 4096
    stream-node-max-entries 100
    activerehashing yes
    client-output-buffer-limit normal 0 0 0
    client-output-buffer-limit replica 256mb 64mb 60
    client-output-buffer-limit pubsub 32mb 8mb 60
    hz 10
    dynamic-hz yes
    aof-rewrite-incremental-fsync yes
    rdb-save-incremental-fsync yes

---
# ConfigMap for Sentinel configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: config
data:
  sentinel.conf: |
    # Redis Sentinel configuration for FitQuest
    
    # Port
    port 26379
    bind 0.0.0.0
    protected-mode no
    
    # Logging
    loglevel notice
    logfile ""
    
    # Monitoring
    # sentinel monitor <master-name> <ip> <port> <quorum>
    sentinel monitor mymaster redis-cluster-0.redis-cluster.fitquest.svc.cluster.local 6379 2
    
    # Timeouts
    sentinel down-after-milliseconds mymaster 30000
    sentinel parallel-syncs mymaster 1
    sentinel failover-timeout mymaster 180000
    
    # Notification scripts (optional)
    # sentinel notification-script mymaster /path/to/notification.sh
    # sentinel client-reconfig-script mymaster /path/to/reconfig.sh
    
    # Deny scripts
    deny-scripts-reconfig yes
