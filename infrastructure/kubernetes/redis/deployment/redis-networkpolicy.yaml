---
# NetworkPolicy for Redis cluster
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: fitquest
  labels:
    app: redis-cluster
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: redis-cluster
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Redis communication between cluster nodes
    - from:
        - podSelector:
            matchLabels:
              app: redis-cluster
      ports:
        - protocol: TCP
          port: 6379
    # Allow Sentinel communication
    - from:
        - podSelector:
            matchLabels:
              app: redis-sentinel
      ports:
        - protocol: TCP
          port: 6379
    # Allow microservices to connect to Redis
    - from:
        - namespaceSelector:
            matchLabels:
              name: fitquest
      ports:
        - protocol: TCP
          port: 6379
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9121
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow communication between Redis nodes
    - to:
        - podSelector:
            matchLabels:
              app: redis-cluster
      ports:
        - protocol: TCP
          port: 6379
    # Allow communication with Sentinel
    - to:
        - podSelector:
            matchLabels:
              app: redis-sentinel
      ports:
        - protocol: TCP
          port: 26379

---
# NetworkPolicy for Redis Sentinel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-sentinel-network-policy
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: redis-sentinel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Sentinel communication between nodes
    - from:
        - podSelector:
            matchLabels:
              app: redis-sentinel
      ports:
        - protocol: TCP
          port: 26379
    # Allow microservices to connect to Sentinel
    - from:
        - namespaceSelector:
            matchLabels:
              name: fitquest
      ports:
        - protocol: TCP
          port: 26379
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9121
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow communication with Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis-cluster
      ports:
        - protocol: TCP
          port: 6379
    # Allow communication between Sentinel nodes
    - to:
        - podSelector:
            matchLabels:
              app: redis-sentinel
      ports:
        - protocol: TCP
          port: 26379
