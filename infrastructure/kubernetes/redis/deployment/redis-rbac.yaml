---
# ServiceAccount for Redis
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: fitquest
  labels:
    app: redis-cluster
    component: rbac

---
# ClusterRole for Redis
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: redis
  labels:
    app: redis-cluster
    component: rbac
rules:
  # Allow reading pod information
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Allow reading pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Allow reading endpoints
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  # Allow reading services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for Redis
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: redis
  labels:
    app: redis-cluster
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redis
subjects:
  - kind: ServiceAccount
    name: redis
    namespace: fitquest

---
# RoleBinding for Redis in fitquest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis
  namespace: fitquest
  labels:
    app: redis-cluster
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: redis
subjects:
  - kind: ServiceAccount
    name: redis
    namespace: fitquest
