---
# Redis Sentinel StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: server
spec:
  serviceName: redis-sentinel
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: redis
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - redis-sentinel
                topologyKey: kubernetes.io/hostname
      containers:
        # Redis Sentinel container
        - name: sentinel
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-sentinel
            - /etc/redis/sentinel.conf
          ports:
            - name: sentinel
              containerPort: 26379
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -p
                - "26379"
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: sentinel-config
              mountPath: /etc/redis
            - name: sentinel-data
              mountPath: /data
        
        # Sentinel Exporter for Prometheus metrics
        - name: sentinel-exporter
          image: oliver006/redis_exporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          args:
            - "-redis.addr=localhost:26379"
            - "-redis.password="
            - "-namespace=redis_sentinel"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: sentinel-config
          configMap:
            name: sentinel-config
            items:
              - key: sentinel.conf
                path: sentinel.conf

  volumeClaimTemplates:
    - metadata:
        name: sentinel-data
        labels:
          app: redis-sentinel
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi

---
# Sentinel Service (ClusterIP for internal communication)
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: service
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis-sentinel
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP

---
# Sentinel Client Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: sentinel-client
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: client-service
spec:
  type: ClusterIP
  selector:
    app: redis-sentinel
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP
