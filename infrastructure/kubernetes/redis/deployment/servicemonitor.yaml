---
# ServiceMonitor for Redis Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-cluster
  namespace: fitquest
  labels:
    app: redis-cluster
    component: monitoring
spec:
  selector:
    matchLabels:
      app: redis-cluster
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s

---
# ServiceMonitor for Redis Sentinel Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-sentinel
  namespace: fitquest
  labels:
    app: redis-sentinel
    component: monitoring
spec:
  selector:
    matchLabels:
      app: redis-sentinel
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
