apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: fitquest
  labels:
    app: auth-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: fitquest/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: database-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: redis-connection-string
        - name: Jwt__Secret
          valueFrom:
            secretKeyRef:
              name: auth-service-secrets
              key: jwt-secret
        - name: Jwt__Issuer
          value: "fitquest"
        - name: Jwt__Audience
          value: "fitquest-mobile"
        - name: Jwt__AccessTokenExpiryMinutes
          value: "15"
        - name: Jwt__RefreshTokenExpiryDays
          value: "7"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
