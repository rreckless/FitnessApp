apiVersion: apps/v1
kind: Deployment
metadata:
  name: exercise-library-service
  namespace: fitquest
  labels:
    app: exercise-library-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: exercise-library-service
  template:
    metadata:
      labels:
        app: exercise-library-service
        version: v1
    spec:
      containers:
      - name: exercise-library-service
        image: exercise-library-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: exercise-library-secrets
              key: database-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: exercise-library-secrets
              key: redis-connection-string
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - exercise-library-service
              topologyKey: kubernetes.io/hostname
