apiVersion: apps/v1
kind: Deployment
metadata:
  name: streak-service
  namespace: fitquest
  labels:
    app: streak-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: streak-service
  template:
    metadata:
      labels:
        app: streak-service
    spec:
      containers:
      - name: streak-service
        image: streak-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: streak-service-secrets
              key: database-connection-string
        - name: ConnectionStrings__RabbitMQ
          valueFrom:
            secretKeyRef:
              name: streak-service-secrets
              key: rabbitmq-connection-string
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      restartPolicy: Always
