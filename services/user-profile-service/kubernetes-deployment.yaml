apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-profile-service
  namespace: fitquest
  labels:
    app: user-profile-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-profile-service
  template:
    metadata:
      labels:
        app: user-profile-service
        version: v1
    spec:
      containers:
      - name: user-profile-service
        image: fitquest/user-profile-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: user-profile-service-secrets
              key: database-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: user-profile-service-secrets
              key: redis-connection-string
        - name: AWS__S3__BucketName
          valueFrom:
            configMapKeyRef:
              name: user-profile-service-config
              key: s3-bucket-name
        - name: AWS__S3__PresignedUrlExpirationMinutes
          valueFrom:
            configMapKeyRef:
              name: user-profile-service-config
              key: s3-presigned-url-expiration
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: user-profile-service-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: user-profile-service-secrets
              key: aws-secret-access-key
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: user-profile-service-config
              key: aws-region
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - user-profile-service
              topologyKey: kubernetes.io/hostname
